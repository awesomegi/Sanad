{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sanad{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Your custom CSS -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'home' %}">Sanad</a>

      <div class="ms-auto">
        {% if user.is_authenticated %}
          <span class="me-3">Hi, {{ user.first_name }}</span>
          <a href="#" class="btn btn-outline-dark btn-sm">Logout</a>
        {% else %}
          <a href="#" class="btn btn-outline-dark btn-sm me-2">Log in</a>
          <a href="#" class="btn btn-dark btn-sm">Sign up</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <!-- Page content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="border-top mt-5 py-4">
    <div class="container text-center text-muted small">
      <p class="mb-0">© 2026 Sanad — Built for Tuwaiq Academy bootcamp</p>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
