{% extends 'base.html' %}

{% block title %}Payment failed — Sanad{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5 text-center">

      <div class="mb-4" style="font-size: 64px;">❌</div>

      <h1 class="h3 fw-bold mb-2">Payment didn't go through</h1>
      <p class="text-muted mb-4">
        Something went wrong with your payment. Your booking was not confirmed.
      </p>

      <a href="{% url 'checkout' booking_id %}" class="btn btn-dark px-4 py-2 fw-medium me-2">Try again</a>
      <a href="{% url 'seeker_dashboard' %}" class="btn btn-outline-dark px-4 py-2">Back to dashboard</a>

    </div>
  </div>
</div>
{% endblock %}
