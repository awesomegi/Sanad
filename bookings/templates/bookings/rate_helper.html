{% extends 'base.html' %}
{% block content %}

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="p-5" style="background:#1a1a1a; border-radius:20px; border:1px solid #333;">

                <!-- العنوان -->
                <h3 class="text-center mb-1" style="color:#fff; font-weight:800;">⭐ قيّم المساعد</h3>
                <p class="text-center mb-4" style="color:#888; font-size:0.9rem;">
                    {{ booking.helper.user.get_full_name }}
                    &nbsp;·&nbsp;
                    {{ booking.service.name }}
                    &nbsp;·&nbsp;
                    {{ booking.scheduled_date }}
                </p>

                <form method="post">
                    {% csrf_token %}

                    <!-- النجوم -->
                    <div class="text-center mb-4">
                        <p style="color:#d4af37; font-weight:600; margin-bottom:1rem;">اختر تقييمك</p>
                        <div class="d-flex justify-content-center gap-2" id="starsContainer">
                            {% for i in "12345" %}
                            <label style="cursor:pointer; font-size:2.5rem; color:#444; transition:color 0.2s;"
                                   class="star-label" data-value="{{ forloop.counter }}">
                                ★
                                <input type="radio" name="score" value="{{ forloop.counter }}"
                                       style="display:none;" required>
                            </label>
                            {% endfor %}
                        </div>
                    </div>

                    <!-- التعليق -->
                    <div class="mb-4">
                        <label style="color:#d4af37; font-size:0.88rem; font-weight:600;">تعليق (اختياري)</label>
                        <textarea name="comment" rows="3"
                                  placeholder="شاركنا تجربتك مع هذا المساعد..."
                                  style="background:#2c2c2c; border:1px solid #444; color:#fff; border-radius:10px; padding:10px 14px; width:100%; margin-top:8px; resize:none;">
                        </textarea>
                    </div>

                    <!-- زر الإرسال -->
                    <div class="d-grid">
                        <button type="submit"
                                style="background:#d4af37; color:#1a1a1a; border:none; border-radius:12px; padding:14px; font-weight:700; font-size:1rem; cursor:pointer;">
                            إرسال التقييم
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<style>
    body { background-color: #111; }
    ::placeholder { color: #666 !important; }
    .star-label:hover,
    .star-label.active { color: #d4af37 !important; }
</style>

<script>
    const stars = document.querySelectorAll('.star-label');

    stars.forEach((star, index) => {
        star.addEventListener('click', () => {
            // تفعيل الراديو
            star.querySelector('input').checked = true;

            // تلوين النجوم
            stars.forEach((s, i) => {
                s.style.color = i <= index ? '#d4af37' : '#444';
            });
        });

        star.addEventListener('mouseover', () => {
            stars.forEach((s, i) => {
                s.style.color = i <= index ? '#d4af37' : '#444';
            });
        });

        star.addEventListener('mouseout', () => {
            const checked = document.querySelector('input[name="score"]:checked');
            const checkedIndex = checked ? parseInt(checked.value) - 1 : -1;
            stars.forEach((s, i) => {
                s.style.color = i <= checkedIndex ? '#d4af37' : '#444';
            });
        });
    });
</script>

{% endblock %}
