{% extends 'base.html' %}

{% block title %}Sanad — Sign In{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0" style="background-color: #1a1a1a; color: #fff; border-radius: 15px; border: 1px solid #333;">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4" style="color: #d4af37; font-weight: bold;">تسجيل الدخول</h2>
                    
                    {% if error_message %}
                        <div class="alert alert-danger text-center" style="background-color: #721c24; color: #fff; border: none; border-radius: 10px;">
                            {{ error_message }}
                        </div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label text-white-50 small">البريد الإلكتروني</label>
                            {{ form.email }}
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-white-50 small">كلمة المرور</label>
                            {{ form.password }}
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-lg" style="background-color: #d4af37; color: #1a1a1a; font-weight: bold; border-radius: 10px;">دخول</button>
                        </div>
                    </form>
                    
                    <div class="text-center mt-4">
                        <small style="color: #888;">ليس لديك حساب؟ 
                            <a href="{% url 'helpers:signup_helper' %}" style="color: #d4af37; text-decoration: none; font-weight: bold;">سجل الآن</a>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* تنسيق المدخلات بستايل Minimalist Tech */
    input {
        background-color: #2c2c2c !important;
        border: 1px solid #444 !important;
        color: #fff !important;
        padding: 12px !important;
        border-radius: 10px !important;
        width: 100%;
        transition: 0.3s;
    }
    input:focus {
        border-color: #d4af37 !important;
        box-shadow: 0 0 8px rgba(212, 175, 55, 0.2) !important;
        outline: none;
    }
</style>
{% endblock %}
