{% extends 'base.html' %}

{% block title %}Sanad — Under Review{% endblock %}

{% block content %}
<div class="container text-center mt-5 mb-5">
    <div class="card shadow-lg border-0 p-5" style="background-color: #1a1a1a; color: #fff; border-radius: 15px;">
        <div class="card-body">
            <div class="mb-4">
                <!-- أيقونة ساعة أو علامة انتظار -->
                <i class="fas fa-clock fa-4x" style="color: #d4af37;"></i>
            </div>
            <h2 style="color: #d4af37;">طلبك قيد المراجعة حالياً</h2>
            <p class="mt-4 text-muted">
                شكراً لانضمامك إلى <strong>سند</strong>. فريقنا يقوم حالياً بمراجعة الوثائق الرسمية التي أرفقتها.
            </p>
            <p class="text-muted">ستصلك رسالة عبر البريد الإلكتروني فور تحديث حالة طلبك.</p>
            
            <a href="{% url 'home' %}" class="btn mt-4" style="border: 1px solid #d4af37; color: #d4af37;">العودة للرئيسية</a>
        </div>
    </div>
</div>
{% endblock %}
