{% extends 'base.html' %}

{% block title %}Sign Up — Sanad{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7">

      <h2 class="mb-4">Create a Seeker account</h2>

      {% for message in messages %}
        <div class="alert alert-danger">{{ message }}</div>
      {% endfor %}

      <form method="post">
        {% csrf_token %}

        <div class="row mb-3">
          <div class="col">
            <label class="form-label">First Name</label>
            <input type="text" name="first_name" class="form-control" required>
          </div>
          <div class="col">
            <label class="form-label">Last Name</label>
            <input type="text" name="last_name" class="form-control" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" name="password_confirm" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Disability Type</label>
          <select name="disability_type" class="form-select" required>
            <option value="">-- Select --</option>
            <option value="PERMANENT">Permanent</option>
            <option value="TEMPORARY">Temporary</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Disability Category</label>
          <select name="disability_category" class="form-select" required>
            <option value="">-- Select --</option>
            <option value="MOBILITY">Mobility</option>
            <option value="VISUAL">Visual</option>
            <option value="HEARING">Hearing</option>
            <option value="COGNITIVE">Cognitive</option>
            <option value="TEMPORARY_INJURY">Temporary Injury</option>
            <option value="OTHER">Other</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Address</label>
          <input type="text" name="address" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Emergency Contact</label>
          <input type="text" name="emergency_contact" class="form-control">
        </div>

        <button type="submit" class="btn btn-dark w-100 mt-2">Sign up</button>
      </form>

      <p class="mt-3 text-center">
        Already have an account? <a href="{% url 'login' %}">Log in</a>
      </p>

    </div>
  </div>
</div>
{% endblock %}
