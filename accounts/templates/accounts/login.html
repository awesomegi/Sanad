{% extends 'base.html' %}

{% block title %}Log In — Sanad{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">

      <div class="text-center mb-4">
        <h1 class="h3 fw-bold mb-2">Welcome back</h1>
        <p class="text-muted">Log in to your Sanad account.</p>
      </div>

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger small">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="post" class="card border-0 shadow-sm">
        {% csrf_token %}
        <div class="card-body p-4 p-md-5">

          <div class="mb-3">
            <label for="email" class="form-label small fw-medium">Email</label>
            <input type="email" name="email" id="email" class="form-control" required autofocus>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label small fw-medium">Password</label>
            <input type="password" name="password" id="password" class="form-control" required>
          </div>

          <button type="submit" class="btn btn-dark w-100 mt-3 py-2 fw-medium">Log in</button>

        </div>
      </form>

      <p class="text-center mt-3 small text-muted">
        Don't have an account? <a href="{% url 'signup_seeker' %}" class="text-dark fw-medium">Sign up</a>
      </p>

    </div>
  </div>
</div>
{% endblock %}
