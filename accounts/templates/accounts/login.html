{% extends 'base.html' %}

{% block title %}Log In — Sanad{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <h2 class="mb-4">Log in</h2>

      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-dark w-100 mt-2">Log in</button>
      </form>

      <p class="mt-3 text-center">
        Don't have an account? <a href="{% url 'signup_seeker' %}">Sign up</a>
      </p>

    </div>
  </div>
</div>
{% endblock %}
